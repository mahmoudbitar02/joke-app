<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>witze-app</title>
  </head>
  <body>
    <div id="app">
      <button id="theme-toggle"></button>
      <select id="category-select">
        <option value="">Alle Kategorien</option>
        <option value="lehrerwitze">lehrerwitze</option>
        <option value="flachwitze">Flachwitze</option>
        <option value="programmierwitze">Programmierwitze</option>
        <option value="scherzfragen">Scherzfragen</option>
        <option value="chuck-norris-witze">Chuck Norris Witze</option>
        <option value="antiwitze">Antiwitze</option>
        <option value="blondinenwitze">Blondinen Witze</option>
      </select>

      <div class="container">
        <h1 class="heading">Witze App</h1>
        <section class="main">
          <article class="current-joke">
            <p class="current-joke__text">lorem ipsum dolor sit amet consectetur, adipisicing elit. Quam velit, ad ipsa ea eum architecto!</p>
            <div class="current-joke__actions">
              <button class="current-joke__actions--new">Neue Witz laden</button>
              <button class="current-joke__actions--save">
                Witz speichern
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z"
                  />
                </svg>
              </button>
            </div>
          </article>

          <article class="saved-joke">
            <h2 class="saved-joke__title">Gespeicherte Witze</h2>

            <div class="saved-joke__container"></div>
          </article>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
